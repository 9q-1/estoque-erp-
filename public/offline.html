<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sem conexão · Estoque ERP</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #F5F7F6;
        color: #152019;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
      }
      .icone {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #157A42;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        color: #fff;
        font-weight: 700;
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      p {
        font-size: 14px;
        color: #57645D;
        margin: 0;
        max-width: 280px;
      }
      button {
        margin-top: 8px;
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        background: #157A42;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icone">E</div>
      <h1>Sem conexão no momento</h1>
      <p>Não foi possível carregar esta página. Verifique sua internet e tente novamente.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
